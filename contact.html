<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ash Cygan | Contact</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; color: #222; }
    header { background: #1a1a2e; color: white; padding: 20px; text-align: center; }
    nav { background: #16213e; display: flex; justify-content: center; gap: 20px; padding: 12px; flex-wrap: wrap; }
    nav a { color: #e94560; text-decoration: none; font-weight: bold; }
    nav a:hover { text-decoration: underline; }
    main { padding: 30px 20px; max-width: 900px; margin: auto; }
    section { background: #f4f4f4; padding: 20px; border-radius: 8px; margin-top: 20px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-weight: bold; margin-bottom: 6px; }
    input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 1em; }
    button { background: #e94560; color: white; padding: 12px 30px; border: none; border-radius: 6px; font-size: 1em; cursor: pointer; }
    button:hover { background: #c73652; }
    footer { background: #1a1a2e; color: white; text-align: center; padding: 15px; margin-top: 40px; }
  </style>
</head>
<body>

  <!-- Site header -->
  <header>
    <h1>Ash Cygan</h1>
    <p>BIT Student | Graphics Designer | Voice Artist</p>
  </header>

  <!-- Navigation -->
  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">Bio</a>
    <a href="gallery.html">Media</a>
    <a href="data.html">Results</a>
    <a href="contact.html">Contact</a>
  </nav>

  <main>

    <!-- Contact form section -->
    <section>
      <h2>Get In Touch</h2>
      <p>Fill in the form below to contact me for design work, voiceover projects, or collaborations.</p>
      <br/>

      <form action="#" method="post">

        <!-- Name field -->
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="Enter your full name" required />
        </div>

        <!-- Email field -->
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="Enter your email" required />
        </div>

        <!-- Phone field -->
        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" placeholder="e.g. +256 700 000000" />
        </div>

        <!-- Message field -->
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" placeholder="Write your message here..." required></textarea>
        </div>

        <button type="submit">Send Message</button>

      </form>
    </section>

  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 Ash Cygan | BIT1203 Web Design & Development | MUST</p>
  </footer>

</body>
</html>
